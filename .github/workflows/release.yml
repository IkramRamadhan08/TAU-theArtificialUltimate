name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-x11-0 libxcb-cursor0 libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libfontconfig-dev libwayland-dev wayland-protocols \
            libx11-dev libx11-xcb-dev libasound2-dev
      - name: Build release
        run: cargo build --release --bin tau
      - name: Package
        working-directory: .
        run: |
          mkdir -p dist/tau.app/libexec
          cp editor/target/release/tau dist/tau.app/libexec/tau-editor
          tar czf tau-x86_64-linux.tar.gz -C dist tau.app
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: tau-x86_64-linux.tar.gz

  build-macos-x86-64:
    runs-on: macos-13
    defaults:
      run:
        working-directory: editor
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build release
        run: cargo build --release --bin tau
      - name: Package
        working-directory: .
        run: |
          cp editor/target/release/tau tau-x86_64-macos
          chmod +x tau-x86_64-macos
          tar czf tau-x86_64-macos.tar.gz tau-x86_64-macos
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: tau-x86_64-macos.tar.gz

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: editor
    steps:
      - uses: actions/checkout@v4
      - name: Enable long paths
        run: git config core.longpaths true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build release
        run: cargo build --release --bin tau
      - name: Package
        working-directory: .
        run: |
          mkdir -p dist
          copy editor\target\release\tau.exe dist\tau-x86_64-windows.exe
          Compress-Archive -Path dist\tau-x86_64-windows.exe -DestinationPath tau-x86_64-windows.zip
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: tau-x86_64-windows.zip
