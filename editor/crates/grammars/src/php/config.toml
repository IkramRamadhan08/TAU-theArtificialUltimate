name = "PHP"
grammar = "php"
path_suffixes = ["php", "phtml", "php3", "php4", "php5", "php7", "php8", "phps", "phpt", "pht"]
first_line_pattern = '^#!.*\bphp\b'
line_comments = ["// ", "# "]
autoclose_before = "}])>,;"
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["comment", "string"] },
    { start = "'", end = "'", close = true, newline = false, not_in = ["string", "comment"] },
]
increase_indent_pattern = "^\\s*(\\b(if|else|elseif|for|foreach|while|function|class|trait|interface|match|try|catch|finally|switch|case|default|declare)\\b.*)\\s*$"
